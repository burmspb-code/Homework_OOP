name: CI/CD - Build, Test and Deploy

on:
  push:
    # Запускается в main и во всех ветках, начинающихся на feature/
    branches: [ "main", "feature/**" ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests and generate coverage
        run: |
          # Запускаем тесты и создаем отчет в папке htmlcov
          pytest --cov=src --cov-report=html --cov-report=term-missing

      - name: Prepare Deployment Directory
        run: |
          # 1. Создаем временную папку для деплоя
          mkdir -p public/coverage
          
          # 2. Создаем файл .nojekyll, чтобы GitHub Pages не игнорировал папку coverage
          touch public/.nojekyll
          
          # 3. Переносим содержимое отчета в папку coverage
          if [ -d "htmlcov" ]; then
            cp -r htmlcov/* public/coverage/
          else
            echo "Error: htmlcov directory not found!" && exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          # Очищаем ветку от старых файлов, чтобы избежать мусора
          force_orphan: true 
          
