name: CI/CD - Build, Test and Deploy

on:
  push:
    branches: [ "main" ] # Укажите вашу основную ветку

permissions:
  contents: write # Нужно для публикации в gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests and generate coverage
        run: |
          # Запускаем тесты, создаем HTML-отчет в папке htmlcov
          # --cov=src (замените src на имя вашей папки с кодом)
          pytest --cov=src --cov-report=html --cov-report=term-missing

      - name: Prepare Deployment Directory
        run: |
          # Создаем общую папку для деплоя
          mkdir -p public
          
          # 1. Копируем файлы вашего основного проекта (например, index.html и т.д.)
          # Замените '.' на папку с вашим сайтом, если она отдельная
          cp -r . public/ || true 
          
          # 2. Переносим отчет о тестах в подпапку 'coverage'
          mv htmlcov public/coverage

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public # Публикуем всё содержимое папки public
